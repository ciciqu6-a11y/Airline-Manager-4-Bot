name: Playwright Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "17,43 * * * *" # Menit ganjil sepi dari jam sibuk

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    
    # Hak akses wajib agar bot bisa melakukan push commit ke dalam repositori
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22' # Aman dari bug freeze ekstraksi ZIP

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: pw-version
      run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

    - name: Disable Man-DB Auto-Update
      run: |
        sudo debconf-set-selections <<< "man-db man-db/auto-update boolean false"
        sudo dpkg-reconfigure man-db

    - name: Install Playwright Browsers
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
      run: npx playwright install --with-deps chromium

    - name: Create .env file
      run: |
        touch .env
        echo "EMAIL=${{ secrets.EMAIL }}" >> .env
        echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
        echo "MAX_FUEL_PRICE=${{ vars.MAX_FUEL_PRICE }}" >> .env
        echo "MAX_CO2_PRICE=${{ vars.MAX_CO2_PRICE }}" >> .env
        echo "INCREASE_AIRLINE_REPUTATION=${{ vars.INCREASE_AIRLINE_REPUTATION }}" >> .env
        echo "CAMPAIGN_TYPE=${{ vars.CAMPAIGN_TYPE }}" >> .env
        echo "CAMPAIGN_DURATION=${{ vars.CAMPAIGN_DURATION }}" >> .env

    - name: Run Playwright tests
      run: npx playwright test

    # SOLUSI KOREKSI: Membuat aktivitas nyata sebulan sekali untuk mereset timer 60 hari GitHub
    - name: Keepalive Via Auto Commit (Hanya Tanggal 1)
      if: always()
      run: |
        # Memeriksa apakah hari ini adalah tanggal 01
        if [ "$(date +%d)" = "01" ]; then
          echo "Hari ini tanggal 1, membuat aktivitas commit untuk mereset timer 60 hari GitHub..."
          date > .github/keepalive_timestamp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive_timestamp
          # Tag [skip ci] wajib agar commit ini tidak memicu run tes baru secara berulang-ulang
          git commit -m "chore: keepalive update [skip ci]" || exit 0
          git push
        else
          echo "Bukan tanggal 1, melewati proses commit agar riwayat Git tetap bersih."
        fi
        
