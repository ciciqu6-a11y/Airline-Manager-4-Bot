name: Playwright Tests
on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    
    # Hak akses wajib agar bot bisa melakukan push commit ke dalam repositori
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Random Delay
      run: |
         DELAY=$(( RANDOM % 300 ))
         echo "Menunggu $DELAY detik..."
         sleep $DELAY

    - uses: actions/setup-node@v4
      with:
        node-version: '22' # Aman dari bug freeze ekstraksi ZIP

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: pw-version
      run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

    - name: Disable Man-DB Auto-Update
      run: |
        sudo debconf-set-selections <<< "man-db man-db/auto-update boolean false"
        sudo dpkg-reconfigure man-db

    - name: Install Playwright Browsers
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
      run: npx playwright install --with-deps chromium

    - name: Create .env file
      run: |
        touch .env
        echo "EMAIL=${{ secrets.EMAIL }}" >> .env
        echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
        echo "MAX_FUEL_PRICE=${{ vars.MAX_FUEL_PRICE }}" >> .env
        echo "MAX_CO2_PRICE=${{ vars.MAX_CO2_PRICE }}" >> .env
        echo "INCREASE_AIRLINE_REPUTATION=${{ vars.INCREASE_AIRLINE_REPUTATION }}" >> .env
        echo "CAMPAIGN_TYPE=${{ vars.CAMPAIGN_TYPE }}" >> .env
        echo "CAMPAIGN_DURATION=${{ vars.CAMPAIGN_DURATION }}" >> .env

    - name: Run Playwright tests
      run: npx playwright test

    # SOLUSI KOREKSI: Membuat aktivitas nyata sebulan sekali untuk mereset timer 60 hari GitHub (Hanya 1x sebulan)
    - name: Keepalive Via Auto Commit (Hanya Tanggal 1 Jam 00:17)
      if: always()
      run: |
        # Mengambil data jam dan menit saat ini
        JAM=$(date +%H)
        MENIT=$(date +%M)

        # Cek: Tanggal 1, Jam 00, dan Menit kurang dari 30 (pasti kena di eksekusi menit 17)
        if [ "$(date +%d)" = "01" ] && [ "$JAM" = "00" ] && [ "$MENIT" -lt 30 ]; then
          echo "Kondisi terpenuhi (Tanggal 1, Jam 00, Menit $MENIT). Menjalankan auto-commit..."
          date > .github/keepalive_timestamp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive_timestamp
          # Tag [skip ci] wajib agar commit ini tidak memicu run tes baru secara berulang-ulang
          git commit -m "chore: keepalive update [skip ci]" || exit 0
          git push
        else
          echo "Kondisi tidak terpenuhi (Jam: $JAM:$MENIT). Melewati proses commit agar Git tetap bersih."
        fi
        
