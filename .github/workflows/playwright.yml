name: Playwright Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "01,31 * * * *"
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: pw-version
      run: echo "version=$(npx playwright --version)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

    - name: Install Playwright system dependencies
      run: npx playwright install-deps chromium

    - name: Install Playwright browser
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium
      timeout-minutes: 100

    - name: Create .env file
      run: |
        touch .env
        echo "EMAIL=${{ secrets.EMAIL }}" >> .env
        echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
        echo "MAX_FUEL_PRICE=${{ vars.MAX_FUEL_PRICE }}" >> .env
        echo "MAX_CO2_PRICE=${{ vars.MAX_CO2_PRICE }}" >> .env
        echo "INCREASE_AIRLINE_REPUTATION=${{ vars.INCREASE_AIRLINE_REPUTATION }}" >> .env
        echo "CAMPAIGN_TYPE=${{ vars.CAMPAIGN_TYPE }}" >> .env
        echo "CAMPAIGN_DURATION=${{ vars.CAMPAIGN_DURATION }}" >> .env

    - name: Run Playwright tests
      run: npx playwright test
